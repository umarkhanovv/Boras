<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operator Console</title>
<style>
  :root{
    /* Black / gray / white palette */
    --bg:        #000000;
    --bg-2:      #0a0a0a;
    --panel:     #141414;
    --panel-2:   #1a1a1a;
    --panel-3:   #222222;
    --line:      #2e2e2e;
    --line-2:    #3a3a3a;
    --text:      #ffffff;
    --muted:     #8a8a8a;
    --muted-2:   #a8a8a8;

    /* Custom easing curves — built-in CSS easings are too weak */
    --ease-out:    cubic-bezier(0.23, 1, 0.32, 1);
    --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
    --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);

    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  *{ box-sizing:border-box; }
  html, body{ margin:0; padding:0; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body::before{
    content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,255,255,0.035), transparent 60%),
      linear-gradient(to bottom, var(--bg), var(--bg-2));
  }

  .wrap{ max-width:1320px; margin:0 auto; padding:16px 18px 40px; }

  /* ===== HEADER ===== */
  header{
    display:flex; align-items:center; justify-content:flex-end;
    border:1px solid var(--line); border-radius:8px;
    background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    padding:12px 16px; margin-bottom:14px;
    flex-wrap:wrap; gap:14px;

    /* Entry animation — only transform & opacity, custom ease-out */
    opacity:0; transform:translateY(-8px);
    animation:enterDown 280ms var(--ease-out) 0ms forwards;
  }
  @keyframes enterDown{ to{ opacity:1; transform:translateY(0); } }

  .history-btn{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:12px; letter-spacing:0.04em;
    color:var(--text); text-decoration:none;
    background:var(--panel-2); border:1px solid var(--line); border-radius:6px;
    padding:8px 14px; cursor:pointer;
    transition:background 150ms var(--ease-out), border-color 150ms var(--ease-out);
  }
  .history-btn:hover{
    background:var(--panel-3); border-color:var(--line-2);
  }

  .status-cluster{
    display:flex; gap:10px; font-family:var(--mono); font-size:11px;
    flex-wrap:wrap;
  }
  .status-chip{
    display:flex; align-items:center; gap:8px;
    background:var(--panel-2); border:1px solid var(--line);
    padding:6px 12px; border-radius:6px;
    transition:border-color 200ms var(--ease-out), background 200ms var(--ease-out);
  }
  .status-chip .label{ color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
  .status-chip .value{ color:var(--text); letter-spacing:0.06em; }
  .led{
    width:8px; height:8px; border-radius:50%; background:var(--muted);
    flex-shrink:0;
    transition:background 200ms var(--ease-out);
  }
  .led.live{ background:#fff; box-shadow:0 0 8px rgba(255,255,255,0.55); animation:ledPulse 1.8s var(--ease-in-out) infinite; }
  .led.connecting, .led.reconnecting{ background:#bdbdbd; box-shadow:0 0 6px rgba(189,189,189,0.5); animation:ledPulse 1s var(--ease-in-out) infinite; }
  .led.failed, .led.stopped{ background:#5a5a5a; }
  @keyframes ledPulse{ 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  .mode-pill{
    display:inline-flex; align-items:center; gap:8px;
    padding:6px 12px; border-radius:14px; font-family:var(--mono);
    font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    border:1px solid var(--line); background:var(--panel-2);
    transition:border-color 200ms var(--ease-out), background 200ms var(--ease-out), color 200ms var(--ease-out);
    color:var(--muted-2);
  }
  .mode-pill .mode-dot{
    width:6px; height:6px; border-radius:50%; background:var(--muted);
    transition:background 200ms var(--ease-out), box-shadow 200ms var(--ease-out);
  }
  .mode-pill[data-mode="PATROL"]{ color:#ddd; border-color:var(--line-2); }
  .mode-pill[data-mode="PATROL"] .mode-dot{ background:#ddd; animation:ledPulse 2.4s var(--ease-in-out) infinite; }
  .mode-pill[data-mode="TRACKING"]{ color:#fff; border-color:#fff; background:rgba(255,255,255,0.08); }
  .mode-pill[data-mode="TRACKING"] .mode-dot{ background:#fff; box-shadow:0 0 6px #fff; animation:ledPulse 0.7s var(--ease-in-out) infinite; }
  .mode-pill[data-mode="MANUAL"]{ color:#bdbdbd; border-color:#666; }
  .mode-pill[data-mode="MANUAL"] .mode-dot{ background:#bdbdbd; box-shadow:0 0 4px #bdbdbd; }

  /* ===== MAIN LAYOUT ===== */
  .main-grid{
    display:grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap:14px;
    margin-bottom:14px;
  }
  @media (max-width:960px){ .main-grid{ grid-template-columns:1fr; } }

  /* ===== FEED (clean — no overlays) ===== */
  .feed-frame{
    position:relative; border:1px solid var(--line); border-radius:8px;
    overflow:hidden; background:#000; aspect-ratio:16/9;
    box-shadow:0 4px 24px rgba(0,0,0,0.6);

    /* Staggered entry — panel 2 of main grid */
    opacity:0; transform:scale(0.985);
    animation:enterScale 320ms var(--ease-out) 60ms forwards;
  }
  @keyframes enterScale{ to{ opacity:1; transform:scale(1); } }
  .feed-frame img{ width:100%; height:100%; display:block; object-fit:cover; }

  /* ===== SIDEBAR ===== */
  .sidebar{ display:flex; flex-direction:column; gap:14px; }
  .panel{
    background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border:1px solid var(--line); border-radius:8px; padding:14px;
    position:relative; overflow:hidden;

    /* Staggered entry */
    opacity:0; transform:translateY(8px);
    animation:enterUp 320ms var(--ease-out) forwards;
  }
  .sidebar .panel:nth-child(1){ animation-delay:100ms; }
  .sidebar .panel:nth-child(2){ animation-delay:160ms; }
  @keyframes enterUp{ to{ opacity:1; transform:translateY(0); } }

  .panel h3{
    margin:0 0 12px; font-family:var(--mono); font-size:10px; letter-spacing:0.16em;
    color:var(--muted); text-transform:uppercase; font-weight:500;
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel h3 .accent{ color:var(--text); }

  /* Metrics grid */
  .metric-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .metric{
    background:var(--panel-3); border:1px solid var(--line); border-radius:6px;
    padding:9px 10px; position:relative; overflow:hidden;
    transition:border-color 200ms var(--ease-out);
  }
  .metric .k{
    font-family:var(--mono); font-size:9px; color:var(--muted);
    letter-spacing:0.1em; text-transform:uppercase; margin-bottom:3px;
  }
  .metric .v{
    font-family:var(--mono); font-size:17px; color:var(--text);
    font-weight:500; letter-spacing:0.02em;
    transition:color 180ms var(--ease-out);
  }
  .metric .v.flash{ color:#fff; }
  .metric.danger{ border-color:#666; }
  .metric.danger .v{ color:#fff; }

  /* FPS sparkline */
  .spark-wrap{
    margin-top:10px; height:38px; background:var(--panel-3);
    border:1px solid var(--line); border-radius:6px; padding:6px;
    position:relative; overflow:hidden;
  }
  .spark-wrap::before{
    content:""; position:absolute; inset:0;
    background:linear-gradient(180deg, transparent 60%, rgba(255,255,255,0.04));
    pointer-events:none;
  }
  #fpsSpark{ width:100%; height:100%; display:block; }

  /* Event log */
  .event-log{
    max-height:240px; overflow-y:auto;
    background:var(--panel-3); border:1px solid var(--line); border-radius:6px;
    padding:6px;
  }
  .event-log::-webkit-scrollbar{ width:6px; }
  .event-log::-webkit-scrollbar-track{ background:transparent; }
  .event-log::-webkit-scrollbar-thumb{ background:var(--line-2); border-radius:3px; }
  .event{
    display:flex; gap:8px; padding:5px 6px; border-radius:4px;
    font-family:var(--mono); font-size:10.5px; line-height:1.4;
    border-left:2px solid var(--line-2); margin-bottom:3px;
    background:rgba(255,255,255,0.02);

    /* Transition (not keyframe) so it's interruptible when many events arrive */
    opacity:0; transform:translateY(-4px);
    transition:opacity 220ms var(--ease-out), transform 220ms var(--ease-out);
  }
  .event.shown{ opacity:1; transform:translateY(0); }
  .event .ts{ color:var(--muted); flex-shrink:0; }
  .event .name{ color:var(--text); }
  .event[data-name="target_detected"]{ border-left-color:#bdbdbd; }
  .event[data-name="target_detected"] .name{ color:#fff; }
  .event[data-name="target_lost"]{ border-left-color:#666; }
  .event[data-name="target_lost"] .name{ color:#bdbdbd; }
  .event[data-name="error"]{ border-left-color:#fff; }
  .event[data-name="error"] .name{ color:#fff; }
  .event-empty{
    color:var(--muted); font-family:var(--mono); font-size:10.5px;
    text-align:center; padding:18px 8px;
  }

  /* ===== GUARD BAR ===== */
  .guard-bar{
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border:1px solid var(--line); border-radius:8px;
    padding:14px 16px; margin-bottom:14px;
    position:relative; overflow:hidden;

    opacity:0; transform:translateY(8px);
    animation:enterUp 320ms var(--ease-out) 220ms forwards;

    transition:border-color 240ms var(--ease-out), box-shadow 240ms var(--ease-out);
  }
  .guard-bar.active{
    border-color:#666;
    box-shadow:0 0 18px rgba(255,255,255,0.05);
  }
  .guard-bar.active::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:#fff;
  }
  .guard-left{ display:flex; align-items:center; gap:14px; }
  .guard-icon{
    width:40px; height:40px; border:1px solid var(--line-2); border-radius:8px;
    display:grid; place-items:center; flex-shrink:0;
    background:var(--panel-3);
    transition:border-color 240ms var(--ease-out), background 240ms var(--ease-out);
  }
  .guard-bar.active .guard-icon{
    border-color:#fff;
    background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 70%);
  }
  .guard-icon svg{ width:20px; height:20px; stroke:var(--muted); transition:stroke 240ms var(--ease-out); }
  .guard-bar.active .guard-icon svg{ stroke:#fff; }
  .guard-label{ font-family:var(--mono); font-size:13px; letter-spacing:0.06em; }
  .guard-label .sub{ display:block; color:var(--muted); font-size:11px; margin-top:3px; letter-spacing:0.04em; transition:color 240ms var(--ease-out); }

  .switch-wrap{ display:flex; align-items:center; gap:10px; }
  .switch-state{
    font-family:var(--mono); font-size:10px; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--muted); width:46px; text-align:right;
    transition:color 240ms var(--ease-out);
  }
  .switch-state.on{ color:#fff; }
  .switch{
    width:54px; height:28px; border-radius:14px; background:var(--panel-3);
    border:1px solid var(--line); position:relative; cursor:pointer;
    flex-shrink:0;
    transition:background 240ms var(--ease-out), border-color 240ms var(--ease-out);
  }
  .switch::after{
    content:""; position:absolute; top:2px; left:2px; width:22px; height:22px;
    border-radius:50%; background:var(--muted-2);
    /* Spring-like overshoot via custom curve */
    transition:transform 280ms var(--ease-drawer), background 240ms var(--ease-out), box-shadow 240ms var(--ease-out);
  }
  .switch.on{ background:rgba(255,255,255,0.18); border-color:#fff; }
  .switch.on::after{ transform:translateX(26px); background:#fff; box-shadow:0 0 8px rgba(255,255,255,0.55); }

  /* ===== CONTROL GRID ===== */
  .control-grid{ display:grid; grid-template-columns: 1fr 1fr 1.4fr; gap:14px; }
  @media (max-width:880px){ .control-grid{ grid-template-columns:1fr; } }

  .control-grid .panel{
    /* Stagger control panels */
    animation-delay:280ms;
  }
  .control-grid .panel:nth-child(2){ animation-delay:340ms; }
  .control-grid .panel:nth-child(3){ animation-delay:400ms; }

  .panel.locked{ opacity:0.4; pointer-events:none; filter:saturate(0.5); }

  /* ===== Buttons — crisp and fast, with press feedback ===== */
  .btn{
    background:var(--panel-3); border:1px solid var(--line); color:var(--text);
    border-radius:6px; cursor:pointer; font-family:var(--mono); font-size:18px;
    user-select:none; -webkit-user-select:none;
    position:relative; overflow:hidden;

    /* Only transform & opacity — GPU-friendly. Press feedback is asymmetric:
       snappy on release (160ms), the press itself is instant via :active. */
    transition:transform 160ms var(--ease-out),
               background 160ms var(--ease-out),
               border-color 160ms var(--ease-out),
               color 160ms var(--ease-out),
               box-shadow 160ms var(--ease-out);
  }
  /* Hover only on real pointer devices — touch would false-trigger on tap */
  @media (hover: hover) and (pointer: fine){
    .btn:hover{ border-color:#fff; color:#fff; }
  }
  /* Press feedback — scale(0.97), never smaller. Feels like the UI heard you. */
  .btn:active, .btn.holding{
    transform:scale(0.97);
    background:rgba(255,255,255,0.16);
    border-color:#fff;
    color:#fff;
    box-shadow:inset 0 0 10px rgba(255,255,255,0.16);
  }
  .btn:focus-visible{ outline:2px solid #fff; outline-offset:2px; }

  .dpad{ display:grid; grid-template-columns:48px 48px 48px; grid-template-rows:48px 48px 48px; gap:6px; justify-content:center; }
  .dpad .btn{ width:48px; height:48px; }
  .dpad .empty{ visibility:hidden; }

  .rocker{ display:flex; gap:8px; }
  .rocker .btn{ flex:1; height:44px; font-size:13px; letter-spacing:0.04em; }

  /* ===== Lighting toggle buttons ===== */
  .light-row{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
  .light-btn{
    height:72px; border-radius:8px; cursor:pointer;
    background:var(--panel-3); border:1px solid var(--line); color:var(--text);
    font-family:var(--mono); font-size:12px; letter-spacing:0.08em; text-transform:uppercase;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    position:relative; overflow:hidden; user-select:none; -webkit-user-select:none;

    transition:transform 160ms var(--ease-out),
               background 200ms var(--ease-out),
               border-color 200ms var(--ease-out),
               color 200ms var(--ease-out),
               box-shadow 240ms var(--ease-out);
  }
  .light-btn .ico{ width:22px; height:22px; display:grid; place-items:center; }
  .light-btn .ico svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
  @media (hover: hover) and (pointer: fine){
    .light-btn:hover{ border-color:#fff; color:#fff; }
  }
  .light-btn:active{ transform:scale(0.97); }
  .light-btn.active{
    background:rgba(255,255,255,0.15); border-color:#fff; color:#fff;
    box-shadow:inset 0 0 14px rgba(255,255,255,0.18), 0 0 10px rgba(255,255,255,0.12);
  }

  /* ===== Footer ===== */
  footer{
    margin-top:18px; font-family:var(--mono); font-size:10.5px; color:var(--muted);
    text-align:center; letter-spacing:0.1em; text-transform:uppercase;

    opacity:0; animation:fadeIn 320ms var(--ease-out) 480ms forwards;
  }
  @keyframes fadeIn{ to{ opacity:1; } }

  /* ===== Accessibility: respect reduced motion ===== */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration:0.01ms !important;
      animation-iteration-count:1 !important;
      transition-duration:0.01ms !important;
    }
    /* Keep opacity transitions for comprehension, remove movement */
    header, .feed-frame, .panel, .guard-bar, footer{
      transform:none !important;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== HEADER (status only, no brand text) ===== -->
  <header>
    <div class="status-cluster">
      <div class="status-chip">
        <span class="led" id="camLed"></span>
        <span class="label">CAM</span>
        <span class="value" id="camLedText">—</span>
      </div>
      <div class="mode-pill" id="modePill" data-mode="IDLE">
        <span class="mode-dot"></span>
        <span id="modeText">IDLE</span>
      </div>
      <div class="status-chip">
        <span class="label">UPTIME</span>
        <span class="value" id="uptimeText">00:00</span>
      </div>
    </div>
    <a href="/history" class="history-btn" title="Event history (SQLite)">📜 History</a>
  </header>

  <!-- ===== MAIN GRID ===== -->
  <div class="main-grid">

    <!-- FEED (clean — no overlays) -->
    <div class="feed-frame" id="feedFrame">
      <img src="/stream" alt="Live camera feed" id="feedImg">
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="panel">
        <h3><span>Telemetry</span><span class="accent">LIVE</span></h3>
        <div class="metric-grid">
          <div class="metric">
            <div class="k">FPS</div>
            <div class="v" id="mFps">0.0</div>
          </div>
          <div class="metric">
            <div class="k">Detections</div>
            <div class="v" id="mDet">0</div>
          </div>
          <div class="metric">
            <div class="k">Frames Seen</div>
            <div class="v" id="mFrSeen">0</div>
          </div>
          <div class="metric">
            <div class="k">Frames Proc.</div>
            <div class="v" id="mFrProc">0</div>
          </div>
          <div class="metric">
            <div class="k">PTZ Cmds</div>
            <div class="v" id="mPtz">0</div>
          </div>
          <div class="metric" id="mErrorsBox">
            <div class="k">Errors</div>
            <div class="v" id="mErr">0</div>
          </div>
        </div>
        <div class="spark-wrap">
          <canvas id="fpsSpark"></canvas>
        </div>
      </div>

      <div class="panel">
        <h3><span>Event Log</span><span class="accent" id="eventCount">0</span></h3>
        <div class="event-log" id="eventLog">
          <div class="event-empty">No events yet.</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== GUARD BAR ===== -->
  <div class="guard-bar" id="guardBar">
    <div class="guard-left">
      <div class="guard-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L4 6v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V6l-8-4z"/>
        </svg>
      </div>
      <div class="guard-label">
        AUTO-GUARD
        <span class="sub" id="guardSub">Standby — manual control available</span>
      </div>
    </div>
    <div class="switch-wrap">
      <span class="switch-state" id="switchState">OFF</span>
      <div class="switch" id="guardSwitch" role="button" tabindex="0" aria-label="Toggle Auto-Guard"></div>
    </div>
  </div>

  <!-- ===== CONTROL GRID ===== -->
  <div class="control-grid">

    <div class="panel manual-panel">
      <h3>Pan / Tilt</h3>
      <div class="dpad">
        <div class="empty"></div>
        <button class="btn" data-move="up">▲</button>
        <div class="empty"></div>
        <button class="btn" data-move="left">◀</button>
        <div class="empty"></div>
        <button class="btn" data-move="right">▶</button>
        <div class="empty"></div>
        <button class="btn" data-move="down">▼</button>
        <div class="empty"></div>
      </div>
    </div>

    <div class="panel manual-panel">
      <h3>Optics</h3>
      <div class="rocker">
        <button class="btn" data-zoom="out">− WIDE</button>
        <button class="btn" data-zoom="in">+ TELE</button>
      </div>
      <h3 style="margin-top:14px;">Focus</h3>
      <div class="rocker">
        <button class="btn" data-focus="far">FAR</button>
        <button class="btn" data-focus="near">NEAR</button>
      </div>
    </div>

  </div>

  <footer>by Umarkhanov Askhat</footer>
</div>

<script>
  // ===== State =====
  let guardActive = false;
  const fpsHistory = new Array(60).fill(0);
  const seenEventKeys = new Set();
  const bootTime = Date.now();

  // ===== DOM refs =====
  const $ = (id) => document.getElementById(id);
  const modePill = $('modePill');
  const modeText = $('modeText');
  const camLed = $('camLed');
  const camLedText = $('camLedText');
  const guardBar = $('guardBar');
  const guardSwitch = $('guardSwitch');
  const guardSub = $('guardSub');
  const switchState = $('switchState');
  const eventLog = $('eventLog');
  const eventCount = $('eventCount');

  // ===== Sparkline =====
  const sparkCanvas = $('fpsSpark');
  const sparkCtx = sparkCanvas.getContext('2d');
  function resizeSpark(){
    const r = sparkCanvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    sparkCanvas.width = Math.max(1, r.width * dpr);
    sparkCanvas.height = Math.max(1, r.height * dpr);
    sparkCtx.setTransform(dpr,0,0,dpr,0,0);
  }
  function drawSpark(){
    const w = sparkCanvas.clientWidth, h = sparkCanvas.clientHeight;
    sparkCtx.clearRect(0,0,w,h);
    const max = Math.max(5, ...fpsHistory);
    const step = w / (fpsHistory.length - 1);
    sparkCtx.strokeStyle = 'rgba(255,255,255,0.08)';
    sparkCtx.lineWidth = 1;
    sparkCtx.beginPath();
    for (let i=0;i<=4;i++){ const y = (h/4)*i; sparkCtx.moveTo(0,y); sparkCtx.lineTo(w,y); }
    sparkCtx.stroke();
    sparkCtx.beginPath();
    sparkCtx.moveTo(0, h);
    fpsHistory.forEach((v,i) => {
      const x = i*step;
      const y = h - (v/max)*h*0.9 - 2;
      sparkCtx.lineTo(x, y);
    });
    sparkCtx.lineTo(w, h);
    sparkCtx.closePath();
    const grad = sparkCtx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0, 'rgba(255,255,255,0.4)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    sparkCtx.fillStyle = grad;
    sparkCtx.fill();
    sparkCtx.beginPath();
    fpsHistory.forEach((v,i) => {
      const x = i*step;
      const y = h - (v/max)*h*0.9 - 2;
      if (i===0) sparkCtx.moveTo(x,y); else sparkCtx.lineTo(x,y);
    });
    sparkCtx.strokeStyle = '#ffffff';
    sparkCtx.lineWidth = 1.5;
    sparkCtx.stroke();
  }
  window.addEventListener('resize', () => { resizeSpark(); drawSpark(); });
  resizeSpark();

  // ===== Helpers =====
  function fmtTime(seconds){
    const s = Math.max(0, Math.floor(seconds));
    const m = Math.floor(s/60);
    const r = s % 60;
    const hh = Math.floor(m/60);
    if (hh > 0) return `${String(hh).padStart(2,'0')}:${String(m%60).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;
  }
  function fmtClock(d){
    const pad = (n) => String(n).padStart(2,'0');
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
  function fmtEventTs(iso){
    try{ return fmtClock(new Date(iso)); } catch(e){ return '--:--:--'; }
  }
  function flashMetric(el){
    el.classList.add('flash');
    clearTimeout(el._flashT);
    el._flashT = setTimeout(() => el.classList.remove('flash'), 200);
  }

  // ===== UI updaters =====
  function setMode(mode){
    modePill.dataset.mode = mode;
    modeText.textContent = mode;
  }

  function setGuardUI(active){
    guardActive = active;
    guardSwitch.classList.toggle('on', active);
    guardBar.classList.toggle('active', active);
    switchState.classList.toggle('on', active);
    switchState.textContent = active ? 'ON' : 'OFF';
    guardSub.textContent = active
      ? 'Active — tracking and zoom are automatic'
      : 'Standby — manual control available';
    document.querySelectorAll('.manual-panel').forEach(p => p.classList.toggle('locked', active));
  }

  function setCameraStatus(status){
    camLed.className = 'led ' + status;
    camLedText.textContent = status.toUpperCase();
  }

  function updateMetrics(m){
    if (!m) return;
    const fps = Number(m.fps || 0).toFixed(1);
    const det = m.detections_count ?? 0;
    const frSeen = m.frames_seen ?? 0;
    const frProc = m.frames_processed ?? 0;
    const ptz = m.ptz_commands ?? 0;
    const err = m.errors ?? 0;

    const elFps = $('mFps'), elDet = $('mDet'), elSeen = $('mFrSeen'),
          elProc = $('mFrProc'), elPtz = $('mPtz'), elErr = $('mErr');
    const errBox = $('mErrorsBox');

    if (elFps.textContent !== fps){ elFps.textContent = fps; flashMetric(elFps); }
    if (elDet.textContent !== String(det)){ elDet.textContent = det; flashMetric(elDet); }
    if (elSeen.textContent !== String(frSeen)) elSeen.textContent = frSeen;
    if (elProc.textContent !== String(frProc)) elProc.textContent = frProc;
    if (elPtz.textContent !== String(ptz)){ elPtz.textContent = ptz; flashMetric(elPtz); }
    if (elErr.textContent !== String(err)) elErr.textContent = err;
    errBox.classList.toggle('danger', err > 0);

    fpsHistory.push(Number(m.fps || 0));
    fpsHistory.shift();
    drawSpark();
  }

  function updateEvents(events){
    if (!Array.isArray(events) || events.length === 0){
      eventCount.textContent = '0';
      return;
    }
    eventCount.textContent = events.length;
    const newOnes = [];
    for (const ev of events){
      const key = ev.created_at + '|' + ev.name + '|' + (ev.detail || '');
      if (!seenEventKeys.has(key)){
        seenEventKeys.add(key);
        newOnes.push(ev);
      }
    }
    const empty = eventLog.querySelector('.event-empty');
    if (empty && newOnes.length > 0) empty.remove();

    // Prepend new events; the CSS transition handles the smooth slide-in.
    // Using transitions (not keyframes) so rapid bursts remain interruptible.
    for (const ev of [...newOnes].reverse()){
      const div = document.createElement('div');
      div.className = 'event';
      div.dataset.name = ev.name;
      div.innerHTML = `<span class="ts">${fmtEventTs(ev.created_at)}</span>` +
                      `<span class="name">${ev.name}</span>` +
                      (ev.detail ? `<span style="color:var(--muted-2)">— ${ev.detail}</span>` : '');
      eventLog.insertBefore(div, eventLog.firstChild);
      // Force a reflow then add .shown to trigger the transition
      requestAnimationFrame(() => {
        requestAnimationFrame(() => div.classList.add('shown'));
      });
    }
    while (eventLog.children.length > 60){
      eventLog.removeChild(eventLog.lastChild);
    }
  }

  // ===== Uptime ticker =====
  function tickUptime(){
    $('uptimeText').textContent = fmtTime((Date.now() - bootTime)/1000);
  }
  setInterval(tickUptime, 1000);
  tickUptime();

  // ===== API calls =====
  async function toggleGuard(){
    try{
      const res = await fetch('/api/toggle_guard', { method: 'POST' });
      const data = await res.json();
      setGuardUI(data.status === 'on');
    } catch(e){}
  }

  async function pollStatus(){
    try{
      const res = await fetch('/api/status');
      const data = await res.json();
      setCameraStatus(data.camera_status || 'stopped');
      setGuardUI(!!data.auto_guard);
      if (data.mode) setMode(data.mode);
      updateMetrics(data.metrics);
      updateEvents(data.events);
    } catch(e){
      camLed.className = 'led failed';
      camLedText.textContent = 'UNREACHABLE';
    }
  }
  pollStatus();
  setInterval(pollStatus, 1000);

  // ===== Momentary PTZ / Zoom / Focus buttons =====
  // Multi-touch protection: ignore additional touches while one is in progress.
  function momentary(el, direction, endpoint){
    let active = false;
    const start = (e) => {
      e.preventDefault();
      if (active) return;            // multi-touch protection
      if (guardActive && direction !== 'stop') return;
      active = true;
      el.classList.add('holding');
      fetch(`${endpoint}?direction=${direction}`).catch(()=>{});
    };
    const stop = (e) => {
      if (e) e.preventDefault();
      if (!active) return;
      active = false;
      el.classList.remove('holding');
      fetch(`${endpoint}?direction=stop`).catch(()=>{});
    };
    el.addEventListener('mousedown', start);
    el.addEventListener('touchstart', start, { passive:false });
    el.addEventListener('mouseup', stop);
    el.addEventListener('mouseleave', stop);
    el.addEventListener('touchend', stop);
    el.addEventListener('touchcancel', stop);
  }
  document.querySelectorAll('[data-move]').forEach(el  => momentary(el, el.dataset.move,  '/api/move'));
  document.querySelectorAll('[data-zoom]').forEach(el  => momentary(el, el.dataset.zoom,  '/api/zoom'));
  document.querySelectorAll('[data-focus]').forEach(el => momentary(el, el.dataset.focus, '/api/focus'));

  // ===== Guard switch =====
  guardSwitch.addEventListener('click', toggleGuard);
  guardSwitch.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleGuard(); }
  });

  // ===== Keyboard shortcuts (no animation — used hundreds of times) =====
  // Per the design framework: never animate keyboard-initiated actions.
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (guardActive) return;
    const map = {
      'ArrowUp':    ['move','up'],
      'ArrowDown':  ['move','down'],
      'ArrowLeft':  ['move','left'],
      'ArrowRight': ['move','right'],
      '+': ['zoom','in'], '=': ['zoom','in'],
      '-': ['zoom','out'], '_': ['zoom','out'],
    };
    const m = map[e.key];
    if (!m) return;
    e.preventDefault();
    const sel = `[data-${m[0]}="${m[1]}"]`;
    const btn = document.querySelector(sel);
    if (btn){
      fetch(`/api/${m[0]}?direction=${m[1]}`).catch(()=>{});
    }
  });
</script>
</body>
</html>
